<!DOCTYPE html>

<html>
<head>
  <title>🏦 Register - Smart Bank</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(to right, #4facfe, #00f2fe);
    }

    .container {
      width: 350px;
      margin: 80px auto;
      background: white;
      padding: 30px;
      border-radius: 12px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.2);
      text-align: center;
    }

    h2 {
      margin-bottom: 20px;
    }

    input {
      width: 100%;
      padding: 12px;
      margin: 10px 0;
      border-radius: 6px;
      border: 1px solid #ccc;
      outline: none;
    }

    input:focus {
      border-color: #4facfe;
    }

    button {
      width: 100%;
      padding: 12px;
      background: linear-gradient(to right, #43e97b, #38f9d7);
      border: none;
      color: white;
      font-size: 16px;
      border-radius: 6px;
      cursor: pointer;
      margin-top: 10px;
    }

    .links {
      margin-top: 15px;
    }

    .links a {
      text-decoration: none;
      color: #4facfe;
      font-weight: bold;
      cursor: pointer;
    }
  </style>

</head>

<body>

<div class="container">

  <h2>Create Account</h2>

  <input type="text" id="name" placeholder="Full Name">
  <input type="email" id="email" placeholder="Email Address">
  <input type="password" id="password" placeholder="Password">

  <!-- ✅ Debit Card Details -->

  <input type="text" id="card" placeholder="Debit Card Number (16 digits)">
  <input type="password" id="pin" placeholder="4-digit PIN">

<button onclick="register()">Register</button>

  <div class="links">
    <a onclick="goLogin()">Already have account? Login</a>
  </div>

</div>

<script>
function register() {

  let name = document.getElementById("name").value.trim();
  let email = document.getElementById("email").value.trim();
  let password = document.getElementById("password").value.trim();
  let card = document.getElementById("card").value.trim();
  let pin = document.getElementById("pin").value.trim();

  // Validation
  if (name === "" || email === "" || password === "" || card === "" || pin === "") {
    alert("⚠️ Please fill all fields");
    return;
  }

  if (card.length !== 16 || isNaN(card)) {
    alert("❌ Card must be 16 digits");
    return;
  }

  if (pin.length !== 4 || isNaN(pin)) {
    alert("❌ PIN must be 4 digits");
    return;
  }

  // Save data
  localStorage.setItem("user", email);
  localStorage.setItem("pass", password);
  localStorage.setItem("card", card);
  localStorage.setItem("pin", pin);
  localStorage.setItem("name", name);

  alert("✅ Account Created Successfully!");

  // Redirect to login
  window.location.href = "login.html";
}

function goLogin() {
  window.location.href = "login.html";
}
</script>

</body>
</html>
