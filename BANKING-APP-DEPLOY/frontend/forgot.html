<!DOCTYPE html>
<html>
<head>
  <title>Forgot Password</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(to right, #ff758c, #ff7eb3);
    }

    /* Center Card */
    .container {
      width: 350px;
      margin: 100px auto;
      background: white;
      padding: 30px;
      border-radius: 12px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.2);
      text-align: center;
    }

    h2 {
      margin-bottom: 20px;
      color: #333;
    }

    input {
      width: 100%;
      padding: 12px;
      margin: 10px 0;
      border-radius: 6px;
      border: 1px solid #ccc;
      outline: none;
      transition: 0.3s;
    }

    input:focus {
      border-color: #c175fff0;
      box-shadow: 0 0 6px #c175fff0;
    }

    button {
      width: 100%;
      padding: 12px;
      background: linear-gradient(to right, #841919a0, #ff7e96d9);
      border: none;
      color: white;
      font-size: 16px;
      border-radius: 6px;
      cursor: pointer;
      margin-top: 10px;
      transition: 0.3s;
    }

    button:hover {
      opacity: 0.9;
    }

    .links {
      margin-top: 15px;
      font-size: 14px;
    }

    .links a {
      text-decoration: none;
      color: #330a11;
      margin: 0 5px;
      font-weight: bold;
      cursor: pointer;
    }

    .links a:hover {
      text-decoration: underline;
    }

  </style>
</head>

<body>

<div class="container">

  <h2>Reset Your Password</h2>

  <input type="email" placeholder="Enter Email Address">

  <button onclick="reset()">Send Reset Link</button>

  <div class="links">
    <a onclick="goLogin()">Back to Login</a> |
    <a onclick="goRegister()">Register</a>
  </div>

</div>

<script>
function reset() {
  alert("Reset link sent to your email!");
  window.location.href = "login.html";
}

function goLogin() {
  window.location.href = "login.html";
}

function goRegister() {
  window.location.href = "register.html";
}
</script>

</body>
</html>
