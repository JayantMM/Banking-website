<!DOCTYPE html>
<html>
<head>
<title>Admin Login</title>

<style>
body{
font-family:Arial;
background:#0b4a7a;
margin:0;
text-align:center;
}

.box{
width:420px;
margin:60px auto;
background:white;
padding:35px;
border-radius:12px;
}

input{
width:90%;
padding:14px;
margin:12px;
font-size:18px;
border:1px solid #999;
border-radius:5px;
}

button{
width:95%;
padding:14px;
background:#1f6feb;
color:white;
border:none;
font-size:20px;
cursor:pointer;
border-radius:5px;
}

button:hover{
background:#1558c0;
}

#msg{
margin-top:15px;
font-size:18px;
font-weight:bold;
}

a{
text-decoration:none;
font-size:18px;
color:#4b0082;
}
</style>
</head>

<body>

<div class="box">

<h2>🔐 Admin Login</h2>

<input type="text" id="username" placeholder="Enter Username">

<input type="password" id="password" placeholder="Enter Password">

<button onclick="loginAdmin()">Login</button>

<p id="msg"></p>

<br>
<a href="/login.html">Back to User Login</a>

</div>

<script>

function loginAdmin(){

let user=document.getElementById("username").value.trim();
let pass=document.getElementById("password").value.trim();
let msg=document.getElementById("msg");

if(user==="" || pass===""){
msg.style.color="orange";
msg.innerHTML="⚠ Fill all details";
return;
}

if(user.toLowerCase()==="admin" && pass==="admin123"){

msg.style.color="green";
msg.innerHTML="✅ Login Success";

setTimeout(function(){
window.location.href="/admin.html";
},1000);

}else{

msg.style.color="red";
msg.innerHTML="❌ Wrong Login";

}

}

</script>

</body>
</html>
