<!DOCTYPE html>
<html>
<head>
  <title>Dashboard</title>

  <style>
    body {
      font-family: Arial;
      background: #eaf4fb;
      margin: 0;
    }

    .top-bar {
      display: flex;
      justify-content: space-between;
      background: white;
      padding: 10px 20px;
      border-bottom: 2px solid #ccc;
    }

    .logout-btn {
      background: red;
      color: white;
      padding: 8px;
      border: none;
      cursor: pointer;
    }

    table {
      width: 80%;
      margin: 20px;
      border-collapse: collapse;
      background: white;
    }

    th, td {
      padding: 10px;
      border: 1px solid #ccc;
      text-align: center;
    }

    th {
      background: #3498db;
      color: white;
    }

    /* 👇 Emoji size */
    .emoji {
      font-size: 28px;
    }

    input {
      padding: 6px;
      margin: 5px;
    }

    button {
      padding: 6px 10px;
      background: #3498db;
      color: white;
      border: none;
      cursor: pointer;
    }
  </style>
</head>

<body>

<script>
/* PROTECT PAGE */
if (!localStorage.getItem("loggedIn")) {
  window.location.href = "login.html";
}
</script>

<div class="top-bar">
  <div id="dateTime"></div>
  <button class="logout-btn" onclick="logout()">Logout</button>
</div>

<h2 style="margin-left:20px;">Users</h2>

<table>
  <thead>
    <tr>
      <th>Photo</th>
      <th>ID</th>
      <th>Name</th>
      <th>Balance</th>
    </tr>
  </thead>
  <tbody id="userTable"></tbody>
</table>

<h2 style="margin-left:20px;">Send Money</h2>

<div style="margin-left:20px;">
  From: <input id="fromId">
  To: <input id="toId">
  Amount: <input id="amount">
  <button onclick="sendMoney()">Send</button>
</div>

<h2 style="margin-left:20px;">Transaction History</h2>

<table>
  <thead>
    <tr>
      <th>From</th>
      <th>To</th>
      <th>Amount</th>
      <th>Date & Time</th>
    </tr>
  </thead>
  <tbody id="historyTable"></tbody>
</table>

<script>

/* USERS DATA */
let users = [
  {id:1, name:"Rahul", balance:10000},
  {id:2, name:"Megha", balance:20188.84},
  {id:3, name:"Prakash", balance:75012.15},
  {id:4, name:"Sneha", balance:85012.12}
];

/* DATE TIME */
function updateDateTime() {
  const now = new Date();
  document.getElementById("dateTime").innerHTML =
    now.toLocaleDateString('en-IN') + " | " +
    now.toLocaleTimeString();
}
setInterval(updateDateTime, 1000);
updateDateTime();

/* LOAD USERS WITH 👨 👩 */
function loadUsers() {
  let rows = "";

  users.forEach(u => {

    // 👇 Male / Female emoji
    let icon = (u.id % 2 === 0) ? "👩" : "👨";

    rows += `
      <tr>
        <td class="emoji">${icon}</td>
        <td>${u.id}</td>
        <td>${u.name}</td>
        <td>${u.balance}</td>
      </tr>
    `;
  });

  document.getElementById("userTable").innerHTML = rows;
}

/* SEND MONEY */
function sendMoney() {
  let f = parseInt(document.getElementById("fromId").value);
  let t = parseInt(document.getElementById("toId").value);
  let amt = parseInt(document.getElementById("amount").value);

  let fromUser = users.find(u => u.id === f);
  let toUser = users.find(u => u.id === t);

  if (!fromUser || !toUser) {
    alert("Invalid ID ❌");
    return;
  }

  if (fromUser.balance < amt) {
    alert("Not enough balance ❌");
    return;
  }

  fromUser.balance -= amt;
  toUser.balance += amt;

  alert("Transfer Success ✅");

  let history = JSON.parse(localStorage.getItem("history")) || [];

  history.push({
    from: f,
    to: t,
    amount: amt,
    time: new Date().toLocaleString()
  });

  localStorage.setItem("history", JSON.stringify(history));

  loadUsers();
  loadHistory();
}

/* LOAD HISTORY */
function loadHistory() {
  let history = JSON.parse(localStorage.getItem("history")) || [];
  let rows = "";

  history.forEach(h => {
    rows += `
      <tr>
        <td>${h.from}</td>
        <td>${h.to}</td>
        <td>${h.amount}</td>
        <td>${h.time}</td>
      </tr>
    `;
  });

  document.getElementById("historyTable").innerHTML = rows;
}

/* LOGOUT */
function logout() {
  localStorage.removeItem("loggedIn");
  window.location.replace("login.html");
}

/* INITIAL LOAD */
loadUsers();
loadHistory();

</script>

</body>
</html>
