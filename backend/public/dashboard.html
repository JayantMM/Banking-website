<!DOCTYPE html>
<html>
<head>
<title>Dashboard</title>

<style>
body{
font-family:Arial;
background:#eef2f7;
margin:0;
padding:0;
text-align:center;
}

.top{
background:#1f6feb;
color:white;
padding:18px;
font-size:28px;
font-weight:bold;
}

.box{
width:90%;
max-width:760px;
margin:30px auto;
background:white;
padding:25px;
border-radius:12px;
box-shadow:0 0 12px rgba(0,0,0,0.12);
}

.name{
font-size:24px;
font-weight:bold;
color:#222;
}

.time{
font-size:16px;
color:#666;
margin-bottom:15px;
}

.balance{
font-size:36px;
color:green;
font-weight:bold;
margin:15px 0;
}

input,select{
width:80%;
padding:12px;
margin:8px;
font-size:16px;
border:1px solid #ccc;
border-radius:6px;
box-sizing:border-box;
}

button{
padding:12px 18px;
margin:5px;
border:none;
background:#1f6feb;
color:white;
cursor:pointer;
border-radius:6px;
font-size:16px;
}

button:hover{
background:#1558c0;
}

.logout{
background:red;
}

.logout:hover{
background:#c40000;
}

table{
width:100%;
margin-top:20px;
border-collapse:collapse;
}

th,td{
border:1px solid #ddd;
padding:10px;
}

th{
background:#1f6feb;
color:white;
}

.transferBox{
display:block;
margin-top:20px;
padding:15px;
background:#f7fbff;
border-radius:10px;
border:1px solid #ddd;
}

.loanBox{
margin-top:20px;
padding:15px;
background:#fff8ef;
border-radius:10px;
border:1px solid #ddd;
}

.receipt{
display:none;
margin-top:20px;
padding:15px;
background:#ecfff0;
border:1px solid green;
border-radius:10px;
text-align:left;
line-height:1.8;
}

.loanResult{
display:none;
margin-top:15px;
padding:15px;
background:#ecfff0;
border:1px solid green;
border-radius:10px;
text-align:left;
line-height:1.8;
}

.mode{
width:80%;
margin:15px auto;
text-align:left;
font-size:16px;
}

.radioRow{
display:flex;
align-items:center;
gap:10px;
padding:6px 0;
}

.radioRow input{
width:auto;
margin:0;
}
</style>
</head>

<body>

<div class="top">🏦 USER DASHBOARD</div>

<div class="box">

<div class="name" id="username">User</div>
<div class="time" id="datetime"></div>

<div class="balance">
₹<span id="bal">50000.00</span>
</div>

<input id="amt" type="number" placeholder="Enter Amount">

<br>

<button onclick="receiveMoney()">Receive</button>
<button class="logout" onclick="logout()">Logout</button>

<div class="transferBox" id="transferBox">

<h3>Fund Transfer</h3>

<select id="transferType" onchange="changeTransferType()">
<option value="bank">Transfer By Bank Account</option>
<option value="card">Transfer By Debit Card</option>
</select>

<input id="rname" type="text" placeholder="Receiver Name">

<div id="bankFields">

<input id="accno" type="text" maxlength="16" placeholder="Account Number (15-16 digits)">
<input id="ifsc" type="text" maxlength="11" placeholder="IFSC Code">
<input id="branch" type="text" placeholder="Branch Name">

</div>

<div id="cardFields" style="display:none;">

<input id="dcard" type="text" maxlength="16" placeholder="Debit Card Number">
<input id="cvv" type="password" maxlength="3" placeholder="CVV">
<input id="exp" type="text" placeholder="Expiry MM/YY">

</div>

<div class="mode">

<b>Transfer Mode:</b>

<label class="radioRow">
<input type="radio" name="mode" value="IMPS">
<span>IMPS</span>
</label>

<label class="radioRow">
<input type="radio" name="mode" value="NEFT">
<span>NEFT</span>
</label>

<label class="radioRow">
<input type="radio" name="mode" value="RTGS">
<span>RTGS</span>
</label>

</div>

<button onclick="sendMoney()">Transfer Now</button>

</div>

<div class="loanBox">

<h3>🏦 Apply for Loan</h3>

<input id="loanName" type="text" placeholder="Full Name">

<select id="loanType">
<option value="">Select Loan Type</option>
<option>Home Loan</option>
<option>Personal Loan</option>
<option>Gold Loan</option>
<option>Education Loan</option>
<option>Vehicle Loan</option>
</select>

<input id="loanIncome" type="number" placeholder="Monthly Income">
<input id="loanAmount" type="number" placeholder="Required Loan Amount">
<input id="loanYears" type="number" placeholder="Tenure (Years)">
<input id="loanPurpose" type="text" placeholder="Purpose of Loan">

<button onclick="applyLoan()">Apply Loan</button>

<div class="loanResult" id="loanResult"></div>

</div>

<div class="receipt" id="receipt">

<h3>✅ Payment Successful</h3>

<b>Receiver:</b> <span id="rrname"></span><br>
<b>Account/Card:</b> <span id="racc"></span><br>
<b>IFSC:</b> <span id="rifsc"></span><br>
<b>Amount:</b> ₹<span id="ramount"></span><br>
<b>Mode:</b> <span id="rmode"></span><br>
<b>UTR:</b> <span id="rutr"></span><br>
<b>Date:</b> <span id="rdate"></span>

</div>

<h3>Transaction History</h3>

<table>
<tr>
<th>No</th>
<th>Type</th>
<th>Amount</th>
<th>Date & Time</th>
</tr>

<tbody id="history">
<tr>
<td>1</td>
<td>Deposit</td>
<td>₹5000</td>
<td>02/05/2026 12:30 PM</td>
</tr>
</tbody>

</table>

</div>

<script>

let balance = 50000;

let userData = localStorage.getItem("currentUser");

if(userData){

try{

let user = JSON.parse(userData);

document.getElementById("username").innerHTML =
user.name || user.username || user.email || "User";

if(user.balance){
balance = parseFloat(user.balance);
document.getElementById("bal").innerHTML = balance.toFixed(2);
}

}catch(e){}

}

function updateTime(){

let now = new Date();

document.getElementById("datetime").innerHTML =
now.toLocaleDateString()+" | "+now.toLocaleTimeString();

}

setInterval(updateTime,1000);
updateTime();

function changeTransferType(){

let type = document.getElementById("transferType").value;

if(type=="bank"){
document.getElementById("bankFields").style.display="block";
document.getElementById("cardFields").style.display="none";
}else{
document.getElementById("bankFields").style.display="none";
document.getElementById("cardFields").style.display="block";
}

}

function sendMoney(){

let amt = parseFloat(document.getElementById("amt").value);
let name = document.getElementById("rname").value.trim();
let mode = document.querySelector('input[name="mode"]:checked');
let type = document.getElementById("transferType").value;

if(name=="" || !amt || !mode){
alert("All fields are mandatory");
return;
}

let showAcc = "";
let showIfsc = "-";

if(type=="bank"){

let acc = document.getElementById("accno").value.trim();
let ifsc = document.getElementById("ifsc").value.trim().toUpperCase();
let branch = document.getElementById("branch").value.trim();

if(acc=="" || ifsc=="" || branch==""){
alert("All bank fields required");
return;
}

if(!/^\d{15,16}$/.test(acc)){
alert("Account Number must be 15 or 16 digits");
return;
}

if(!/^[A-Z]{4}\d{7}$/.test(ifsc)){
alert("Invalid IFSC Code");
return;
}

showAcc = "XXXXXXXXXXXX" + acc.slice(-4);
showIfsc = ifsc.slice(0,4) + "XXXXXXX";

}else{

let card = document.getElementById("dcard").value.trim();
let cvv = document.getElementById("cvv").value.trim();
let exp = document.getElementById("exp").value.trim();

if(card=="" || cvv=="" || exp==""){
alert("All card fields required");
return;
}

if(!/^\d{16}$/.test(card)){
alert("Debit Card must be 16 digits");
return;
}

if(!/^\d{3}$/.test(cvv)){
alert("CVV must be 3 digits");
return;
}

showAcc = "XXXXXXXXXXXX" + card.slice(-4);

}

if(amt > balance){
alert("Insufficient Balance");
return;
}

if(amt <= 0){
alert("Enter valid amount");
return;
}

balance -= amt;

document.getElementById("bal").innerHTML = balance.toFixed(2);

let user = JSON.parse(localStorage.getItem("currentUser"));
user.balance = balance.toFixed(2);
localStorage.setItem("currentUser", JSON.stringify(user));

let utr = "UTR" + Math.floor(Math.random()*9999999999);

document.getElementById("rrname").innerHTML = name;
document.getElementById("racc").innerHTML = showAcc;
document.getElementById("rifsc").innerHTML = showIfsc;
document.getElementById("ramount").innerHTML = amt.toFixed(2);
document.getElementById("rmode").innerHTML = mode.value;
document.getElementById("rutr").innerHTML = utr;
document.getElementById("rdate").innerHTML = new Date().toLocaleString();

document.getElementById("receipt").style.display="block";

let table = document.getElementById("history");
let row = table.insertRow(0);

row.innerHTML =
"<td>2</td><td>Transfer</td><td>₹"+amt.toFixed(2)+"</td><td>"+new Date().toLocaleString()+"</td>";

document.getElementById("amt").value="";
document.getElementById("rname").value="";

}

function receiveMoney(){

let amt = parseFloat(document.getElementById("amt").value);

if(!amt || amt<=0){
alert("Enter valid amount");
return;
}

balance += amt;

document.getElementById("bal").innerHTML = balance.toFixed(2);

let user = JSON.parse(localStorage.getItem("currentUser"));
user.balance = balance.toFixed(2);
localStorage.setItem("currentUser", JSON.stringify(user));

alert("₹"+amt.toFixed(2)+" Received Successfully");

document.getElementById("amt").value="";

}

function applyLoan(){

let name = document.getElementById("loanName").value.trim();
let type = document.getElementById("loanType").value;
let income = parseFloat(document.getElementById("loanIncome").value);
let amount = parseFloat(document.getElementById("loanAmount").value);
let years = parseInt(document.getElementById("loanYears").value);
let purpose = document.getElementById("loanPurpose").value.trim();

if(name=="" || type=="" || !income || !amount || !years || purpose==""){
alert("Please fill all loan details");
return;
}

let cibil = Math.floor(Math.random()*250)+550;
let maxLoan = income * 25;
let fee = amount * 0.02;

let rate = 8.5;
if(type=="Personal Loan"){ rate = 12; }
if(type=="Gold Loan"){ rate = 9; }
if(type=="Education Loan"){ rate = 7; }
if(type=="Vehicle Loan"){ rate = 10; }

if(cibil < 650){
alert("Loan Rejected - Low CIBIL Score ("+cibil+")");
return;
}

if(amount > maxLoan){
alert("Loan Rejected - Eligible Limit ₹"+maxLoan.toFixed(0));
return;
}

let r = rate / 12 / 100;
let n = years * 12;

let emi =
(amount * r * Math.pow(1+r,n)) /
(Math.pow(1+r,n)-1);

let ref = "LN" + Math.floor(Math.random()*999999);

document.getElementById("loanResult").style.display="block";

document.getElementById("loanResult").innerHTML =
"<h3>✅ Loan Approved</h3>" +
"<b>Name:</b> "+name+"<br>" +
"<b>Loan Type:</b> "+type+"<br>" +
"<b>Monthly Income:</b> ₹"+income.toFixed(0)+"<br>" +
"<b>CIBIL Score:</b> "+cibil+"<br>" +
"<b>Eligible Limit:</b> ₹"+maxLoan.toFixed(0)+"<br>" +
"<b>Requested Amount:</b> ₹"+amount.toFixed(0)+"<br>" +
"<b>Interest Rate:</b> "+rate+"%<br>" +
"<b>Tenure:</b> "+years+" Years<br>" +
"<b>Monthly EMI:</b> ₹"+emi.toFixed(0)+"<br>" +
"<b>Processing Fee:</b> ₹"+fee.toFixed(0)+"<br>" +
"<b>Reference No:</b> "+ref+"<br>" +
"<b>Status:</b> Approved";

}

function logout(){
localStorage.removeItem("currentUser");
window.location.href="login.html";
}

</script>

</body>
</html>
